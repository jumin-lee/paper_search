<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Archive — 논문 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDF0F3; --surface:#FFFFFF; --ink:#17222E; --muted:#5C6B7A;
    --line:#D6DDE4; --copper:#B4602F; --copper-soft:#F3E4D9;
    --sim:#4C6FBF; --emu:#7B5EA7; --real:#2E7D5B; --survey:#6B7280; --mixed:#0E7490; --unknown:#9AA5B1;
  }
  *{box-sizing:border-box; margin:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} *{transition:none!important} }
  body{
    background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif; font-size:15px; line-height:1.55;
  }
  .mono{font-family:'IBM Plex Mono', monospace}

  /* ── 헤더: 메모리 인벤토리 ── */
  header{
    background:var(--ink); color:#E8EDF2; padding:28px 24px 22px;
    border-bottom:3px solid var(--copper);
  }
  .wrap{max-width:980px; margin:0 auto}
  .eyebrow{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--copper); text-transform:uppercase}
  h1{font-family:'Archivo',sans-serif; font-weight:800; font-size:clamp(24px,4vw,34px); letter-spacing:-.01em; margin-top:6px}
  h1 .addr{color:var(--copper)}
  .inventory{display:flex; gap:26px; margin-top:16px; flex-wrap:wrap}
  .inv-cell{font-family:'IBM Plex Mono',monospace; font-size:12px; color:#9FB0BF}
  .inv-cell b{display:block; font-size:20px; color:#E8EDF2; font-weight:500}
  .inv-cell b em{font-style:normal; color:var(--copper)}

  /* ── 컨트롤 바 ── */
  .controls{
    position:sticky; top:0; z-index:10;
    background:var(--bg); border-bottom:1px solid var(--line);
    padding:12px 24px;
  }
  .controls .wrap{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .tab{
    font-family:'IBM Plex Mono',monospace; font-size:13px;
    border:1px solid var(--line); background:var(--surface); color:var(--muted);
    padding:7px 14px; border-radius:2px; cursor:pointer;
  }
  .tab[aria-pressed="true"]{background:var(--ink); color:#fff; border-color:var(--ink)}
  .tab:focus-visible, .row a:focus-visible, .pin:focus-visible, select:focus-visible, input:focus-visible, .export:focus-visible{
    outline:2px solid var(--copper); outline-offset:2px;
  }
  select,input[type=search]{
    font-family:inherit; font-size:13px; border:1px solid var(--line);
    background:var(--surface); color:var(--ink); padding:7px 10px; border-radius:2px;
  }
  input[type=search]{flex:1; min-width:140px}
  .export{
    margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:12px;
    border:1px dashed var(--copper); color:var(--copper); background:none;
    padding:7px 12px; border-radius:2px; cursor:pointer;
  }
  .export:hover{background:var(--copper-soft)}

  /* ── 태그 토글 바 (다중 선택 OR 필터) ── */
  .tagbar{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px}
  .tagt{
    font-family:'IBM Plex Mono',monospace; font-size:11px;
    border:1px solid var(--line); background:var(--surface); color:var(--muted);
    padding:3px 10px; border-radius:12px; cursor:pointer;
  }
  .tagt b{font-weight:500; color:var(--copper); margin-left:3px}
  .tagt[aria-pressed="true"]{background:var(--ink); border-color:var(--ink); color:#fff}
  .tagt[aria-pressed="true"] b{color:var(--copper)}
  .tagt.reset{border-style:dashed; color:var(--copper); border-color:var(--copper)}

  /* ── 논문 행: 메모리 맵 ── */
  main{padding:20px 24px 80px}
  .round-label{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted);
    letter-spacing:.12em; margin:26px 0 8px; display:flex; align-items:center; gap:10px;
  }
  .round-label::after{content:""; flex:1; height:1px; background:var(--line)}
  .row{
    display:grid; grid-template-columns:64px 1fr auto; gap:14px; align-items:start;
    background:var(--surface); border:1px solid var(--line); border-radius:3px;
    padding:14px 16px; margin-bottom:8px;
    transition:border-color .15s;
  }
  .row:hover{border-color:var(--copper)}
  .row.bookmarked{border-left:3px solid var(--copper)}
  .addr{
    font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--copper);
    padding-top:2px; user-select:all;
  }
  .title a{color:var(--ink); text-decoration:none; font-weight:600; font-size:15px}
  .title a:hover{text-decoration:underline; text-decoration-color:var(--copper)}
  .meta{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--muted);
    margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  .chip{
    font-size:10.5px; padding:2px 8px; border-radius:2px; color:#fff; letter-spacing:.05em;
  }
  .chip.sim{background:var(--sim)} .chip.emu{background:var(--emu)}
  .chip.real{background:var(--real)} .chip.survey{background:var(--survey)}
  .chip.mixed{background:var(--mixed)}
  .chip.unknown{background:none; color:var(--unknown); border:1px dashed var(--unknown)}
  .tchip{color:var(--muted); border:1px solid var(--line); background:var(--bg); padding:2px 7px; border-radius:2px; font-size:10.5px}
  .vchip{color:var(--copper); border:1px solid var(--copper-soft); background:var(--copper-soft); padding:2px 7px; border-radius:2px; font-size:10.5px}
  .note{font-size:13px; color:var(--muted); margin-top:5px}
  .pin{
    background:none; border:none; cursor:pointer; font-size:19px; line-height:1;
    color:var(--line); padding:4px;
  }
  .pin[aria-pressed="true"]{color:var(--copper)}
  .empty{
    text-align:center; color:var(--muted); padding:60px 0;
    font-family:'IBM Plex Mono',monospace; font-size:13px;
  }
  footer{
    border-top:1px solid var(--line); padding:18px 24px; color:var(--muted);
    font-family:'IBM Plex Mono',monospace; font-size:11.5px;
  }
  @media (max-width:640px){
    .row{grid-template-columns:1fr auto}
    .addr{grid-column:1 / -1; padding:0}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="eyebrow">daily arXiv 08:00 KST · monthly conf fetch (매월 1일)</div>
    <h1>PAPER <span class="addr">ARCHIVE</span></h1>
    <div class="inventory">
      <div class="inv-cell">수집 논문<b id="stat-total">—</b></div>
      <div class="inv-cell">북마크<b><em id="stat-bm">—</em></b></div>
      <div class="inv-cell">최신 논문<b id="stat-round" style="font-size:16px; padding-top:3px">—</b></div>
      <div class="inv-cell">주제<b style="font-size:13px; padding-top:5px">CXL·PNM / GPU 공유메모리 / CXL 평가·서베이 / Graph</b></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <button class="tab" data-view="all" aria-pressed="true">전체 피드</button>
    <button class="tab" data-view="bm" aria-pressed="false">북마크</button>
    <select id="f-topic" aria-label="주제 필터">
      <option value="">주제: 전체</option>
      <option value="1">1 · CXL Memory / PNM</option>
      <option value="2">2 · GPU 물리 공유 메모리</option>
      <option value="3">3 · CXL 평가 / 서베이</option>
      <option value="g">G · Graph 특집</option>
    </select>
    <select id="f-eval" aria-label="평가방법 필터">
      <option value="">평가: 전체</option>
      <option value="sim">Simulation</option>
      <option value="emu">Emulation / FPGA</option>
      <option value="real">Real-world</option>
      <option value="mixed">Mixed</option>
      <option value="survey">Survey</option>
      <option value="unknown">미분류</option>
    </select>
    <input type="search" id="f-q" placeholder="제목·비고 검색…" aria-label="검색">
    <button class="export" id="btn-export">북마크 내보내기 ↓</button>
  </div>
  <div class="wrap tagbar" id="tagbar" role="group" aria-label="학회·출처 태그 필터 (다중 선택)"></div>
</div>

<main>
  <div class="wrap" id="list"></div>
</main>

<footer>
  <div class="wrap">
    dedupe: arXiv ID + 정규화 제목 · 제외 목록 <span id="stat-excl">0</span>건 유지 ·
    북마크는 브라우저(localStorage)에 저장되며, 내보내기로 data/bookmarks.js를 갱신해 커밋하면 기기 간 공유됩니다.
  </div>
</footer>

<script src="data/papers.js"></script>
<script src="data/bookmarks.js"></script>
<script>
(function(){
  const EVAL_LABEL = {sim:"SIM", emu:"EMU", real:"REAL", survey:"SURVEY", mixed:"MIXED", unknown:"—"};
  const TOPIC_LABEL = {1:"CXL·PNM", 2:"GPU-UM", 3:"EVAL·SURVEY", g:"GRAPH"};

  // localStorage 오버레이: 저장소의 bookmarks.js를 기본값으로, 이후 토글은 브라우저에 저장
  const LS_KEY = "cxl-paper-bookmarks";
  let bookmarks = new Set(JSON.parse(localStorage.getItem(LS_KEY) || "null") || window.BOOKMARKS);
  const persist = () => localStorage.setItem(LS_KEY, JSON.stringify([...bookmarks]));

  let view = "all", fTopic = "", fEval = "", q = "";
  const selTags = new Set();  // 태그 다중 선택 (비어 있으면 전체, 선택 시 OR)
  const $list = document.getElementById("list");

  function hex(i){ return "0x" + i.toString(16).toUpperCase().padStart(2,"0"); }

  function render(){
    const papers = window.PAPERS.map((p,i)=>({...p, seq:i}));
    let rows = papers.filter(p =>
      (view==="all" || bookmarks.has(p.id)) &&
      (!fTopic || p.topic.includes(fTopic)) &&
      (!fEval || p.eval===fEval) &&
      (!selTags.size || (p.tags||[]).some(t=>selTags.has(t))) &&
      (!q || (p.title+" "+(p.note||"")+" "+(p.venue||"")+" "+(p.date||"")+" "+(p.tags||[]).join(" ")).toLowerCase().includes(q))
    );

    document.getElementById("stat-total").textContent = window.PAPERS.length + " 편";
    document.getElementById("stat-bm").textContent = bookmarks.size + " 편";
    document.getElementById("stat-round").textContent = window.PAPERS.map(p=>p.date||"").sort().pop() || "—";
    document.getElementById("stat-excl").textContent = (window.EXCLUDED||[]).length;

    if(!rows.length){
      $list.innerHTML = '<div class="empty">조건에 맞는 논문이 없습니다 — 필터를 조정해 보세요.</div>';
      return;
    }

    // 북마크 뷰: FIFO 순서 / 전체 뷰: 출판월 최신부터 그룹핑
    let html = "";
    if(view==="bm"){
      const order = [...bookmarks];
      rows.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
      html += rows.map((p,i)=>rowHTML(p, hex(i+1))).join("");
    } else {
      const months = [...new Set(rows.map(p=>(p.date||"").slice(0,7)))].sort((a,b)=>b.localeCompare(a));
      for(const m of months){
        const batch = rows.filter(p=>(p.date||"").slice(0,7)===m)
                          .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
        html += `<div class="round-label">${m||"날짜 미상"} · ${batch.length}편</div>`;
        html += batch.map(p=>rowHTML(p, hex(p.seq))).join("");
      }
    }
    $list.innerHTML = html;

    $list.querySelectorAll(".pin").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = btn.dataset.id;
        bookmarks.has(id) ? bookmarks.delete(id) : bookmarks.add(id);
        persist(); render();
      });
    });
  }

  function rowHTML(p, addr){
    const on = bookmarks.has(p.id);
    const topics = p.topic.map(t=>`<span class="tchip">${TOPIC_LABEL[t]||t}</span>`).join("");
    const vtags = (p.tags||[]).map(t=>`<span class="vchip">${t}</span>`).join("");
    return `<article class="row ${on?"bookmarked":""}">
      <div class="addr mono">${addr}</div>
      <div>
        <div class="title"><a href="${p.url}" target="_blank" rel="noopener">${p.title}</a></div>
        <div class="meta">
          ${p.date?`<span>${p.date}</span>`:""}
          <span>${p.venue||""}</span>
          <span class="chip ${p.eval}">${EVAL_LABEL[p.eval]||p.eval}</span>
          ${topics}
          ${vtags}
        </div>
        ${p.note?`<div class="note">${p.note}</div>`:""}
      </div>
      <button class="pin" data-id="${p.id}" aria-pressed="${on}" title="${on?"북마크 해제":"북마크"}">${on?"●":"○"}</button>
    </article>`;
  }

  // 태그 토글 바: 데이터에서 태그 집계 → 논문 수 내림차순, 다중 선택(OR)
  (function buildTagbar(){
    const counts = {};
    window.PAPERS.forEach(p=>(p.tags||[]).forEach(t=>counts[t]=(counts[t]||0)+1));
    const $bar = document.getElementById("tagbar");
    $bar.innerHTML = Object.entries(counts).sort((a,b)=>b[1]-a[1])
      .map(([t,n])=>`<button class="tagt" data-tag="${t}" aria-pressed="false">${t}<b>${n}</b></button>`)
      .join("") + `<button class="tagt reset" id="tag-reset" hidden>태그 해제 ×</button>`;
    const $reset = document.getElementById("tag-reset");
    $bar.querySelectorAll(".tagt[data-tag]").forEach(btn=>btn.addEventListener("click", ()=>{
      const t = btn.dataset.tag;
      selTags.has(t) ? selTags.delete(t) : selTags.add(t);
      btn.setAttribute("aria-pressed", selTags.has(t));
      $reset.hidden = !selTags.size;
      render();
    }));
    $reset.addEventListener("click", ()=>{
      selTags.clear();
      $bar.querySelectorAll(".tagt[data-tag]").forEach(b=>b.setAttribute("aria-pressed","false"));
      $reset.hidden = true;
      render();
    });
  })();

  // 컨트롤 바인딩
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-pressed","false"));
    t.setAttribute("aria-pressed","true"); view = t.dataset.view; render();
  }));
  document.getElementById("f-topic").addEventListener("change", e=>{fTopic=e.target.value; render();});
  document.getElementById("f-eval").addEventListener("change", e=>{fEval=e.target.value; render();});
  document.getElementById("f-q").addEventListener("input", e=>{q=e.target.value.trim().toLowerCase(); render();});

  // 북마크 내보내기 → data/bookmarks.js 형식으로 다운로드
  document.getElementById("btn-export").addEventListener("click", ()=>{
    const body = "window.BOOKMARKS = " + JSON.stringify([...bookmarks], null, 2) + ";\n";
    const blob = new Blob([body], {type:"text/javascript"});
    const a = Object.assign(document.createElement("a"), {href:URL.createObjectURL(blob), download:"bookmarks.js"});
    a.click(); URL.revokeObjectURL(a.href);
  });

  render();
})();
</script>
</body>
</html>
